<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM Voice Assistant</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="app-container">

        <!-- SETTINGS BUTTON -->
        <button id="settings-btn" class="settings-btn">
            <i class="fa-solid fa-gear"></i>
        </button>

        <!-- SETTINGS PANEL -->
        <div id="settings-panel" class="settings-panel hidden">
            <h3>SAM Settings</h3>
            
            <label for="voice-select">Change Voice:</label>
            <select id="voice-select"></select>

            <div class="toggle-container">
                <label for="wake-word-toggle">Wake Word ("Hey SAM")</label>
                <label class="switch">
                    <input type="checkbox" id="wake-word-toggle">
                    <span class="slider round"></span>
                </label>
            </div>

            <button id="close-settings">Save & Close</button>
        </div>

        <!-- HEADER -->
        <header class="app-header">
            <div class="logo-container">
                <i class="fa-solid fa-robot" id="default-logo"></i>
            </div>
            <h1>SAM</h1>
            <p>Your Personal Voice Assistant</p>
        </header>

        <!-- CHAT DISPLAY -->
        <main class="chat-display">
            <div class="message user-message">
                <span class="label">You:</span>
                <p id="user-text">Tap the mic and say something...</p>
            </div>

            <div class="message sam-message">
                <span class="label">SAM:</span>
                <p id="sam-text">Waiting for your command...</p>
            </div>
        </main>

        <!-- CONTROLS -->
        <footer class="controls">
            <button id="mic-btn" class="mic-button">
                <i class="fa-solid fa-microphone"></i>
            </button>
            <p id="status">Listening status...</p>
        </footer>

    </div>

    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered!', reg))
                .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>

</body>
</html>
